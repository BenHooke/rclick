name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
 
      - name: Install cross (for Linux ARM)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross
 
      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
 
      - name: Package binary
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          TARGET=${{ matrix.target }}
 
          # Determine the arch/os slug used in the asset name
          case "$TARGET" in
            x86_64-unknown-linux-gnu)  SLUG="x86_64-linux" ;;
            aarch64-unknown-linux-gnu) SLUG="aarch64-linux" ;;
            x86_64-apple-darwin)       SLUG="x86_64-macos" ;;
            aarch64-apple-darwin)      SLUG="aarch64-macos" ;;
          esac
 
          ASSET="rclick-${TAG}-${SLUG}.tar.gz"
          BINARY="target/$TARGET/release/rclick"
 
          # Strip debug symbols to shrink binary size
          strip "$BINARY" || true
 
          tar -czf "$ASSET" -C "target/$TARGET/release" rclick
          echo "ASSET=$ASSET" >> $GITHUB_ENV
 
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
